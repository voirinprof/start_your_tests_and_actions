# .github/workflows/ci.yml
# Déclenché à chaque push et Pull Request sur main

name: Tests et couverture

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installer les dépendances
        run: pip install pytest pytest-cov

      - name: Lancer les tests avec couverture
        run: pytest tests/ --cov=src --cov-report=term-missing -v

      - name: Sauvegarder le rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-couverture
          path: coverage.xml
